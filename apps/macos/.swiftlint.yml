included:
  - Sources
  - Tests

excluded:
  - .build
  - DerivedData
  - Myna.xcodeproj

disabled_rules:
  - trailing_comma          # SwiftUI multi-line trailing commas read fine
  - todo                    # we keep TODOs intentionally during overnight build
  # Disabled because SwiftUI's canonical Button/Toggle/etc. form is
  # `Button(action: { ... }) { Label(...) }` — explicit label: argument
  # form is verbose and fights the framework idiom.
  - multiple_closures_with_trailing_closure

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  # force_unwrapping intentionally NOT enabled: tests and #Preview
  # blocks legitimately force-unwrap (e.g. UserDefaults(suiteName:) for
  # an in-memory preview suite, weakly-held targets that are alive by
  # construction). The rule produced more noise than signal.
  - implicit_return
  - last_where
  - sorted_first_last

analyzer_rules:
  - unused_import

line_length:
  warning: 140
  error: 200
  ignores_urls: true
  ignores_comments: true

file_length:
  warning: 600
  error: 1000

type_body_length:
  warning: 350
  error: 500

function_body_length:
  warning: 80
  error: 150

cyclomatic_complexity:
  # The gesture state machine in GestureRecognizer4Finger naturally has
  # 14 branches (Phase.idle/pending/contact × tap/click × pressure/lift).
  # Splitting it further hurts readability — the whole point of having
  # one function is to keep the transitions side-by-side.
  warning: 16
  error: 24

identifier_name:
  # Loops, math helpers, and test scaffolding all use one-letter names
  # legitimately (`for i in 0..<n`, `let r = recognizer`, RGB tuples).
  # Lowering the floor to 1 keeps the rule useful for accidental
  # one-letter PROPERTY names while not punishing local scope.
  min_length: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - url
    - to
    - at
